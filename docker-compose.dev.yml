volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./opentaberna-postgres
  redis_data:
    driver: local

services:
  opentaberna-api:
    build:
      context: .
      dockerfile: src/Dockerfile
    image: opentaberna-api:latest
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    expose:
      - "8000"
    networks:
      frontproxy_fnet:
        ipv4_address: 172.20.20.21
      backend:
    restart: unless-stopped
    container_name: opentaberna-api
    depends_on:
      - opentaberna-db
      - opentaberna-redis

  opentaberna-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opentaberna_password}
      POSTGRES_DB: ${POSTGRES_DB:-opentaberna}
      POSTGRES_USER: ${POSTGRES_USER:-opentaberna}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    container_name: opentaberna-db
    expose:
      - "5432"

  opentaberna-redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    container_name: opentaberna-redis
    expose:
      - "6379"

networks:
  frontproxy_fnet:
    external: true
  backend:
    name: opentaberna-api_backend
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"